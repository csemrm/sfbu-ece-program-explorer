name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sfbu
          POSTGRES_PASSWORD: sfbu_test
          POSTGRES_DB: sfbu_ece_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        run: npm run test
        env:
          DATABASE_URL: postgresql://sfbu:sfbu_test@localhost:5432/sfbu_ece_test
          JWT_SECRET: test_secret
          NODE_ENV: test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_APP_NAME: SFBU ECE Program Explorer

  docker:
    name: Docker Build (Production)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend production image
        run: |
          docker build \
            --target production \
            --tag sfbu-backend:ci \
            ./backend

      - name: Build frontend production image
        run: |
          docker build \
            --target production \
            --tag sfbu-frontend:ci \
            ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api/v1
          NEXT_PUBLIC_APP_NAME: SFBU ECE Program Explorer
